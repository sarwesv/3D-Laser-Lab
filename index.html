<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D laser lab</title>
    <script type="module" crossorigin src="/3D-Laser-Lab/assets/index-Bf6eRxr-.js"></script>
    <link rel="stylesheet" crossorigin href="/3D-Laser-Lab/assets/index-D8KgIoZ_.css">
  </head>
  <body>
    <div id="container"></div>
    
    <div id="ui-overlay">
      <div id="top-trigger"></div>
      <!-- Status Panel (Top Left) -->
      <div id="status-panel" class="glass-module">
        <h1 class="liquid-title">3D Laser Lab</h1>
        <div id="mode-selector">
          <button id="btn-mode-sandbox" class="btn-mode active">Sandbox</button>
          <button id="btn-mode-challenges" class="btn-mode">Challenges</button>
          <button id="btn-mode-racing" class="btn-mode">Racing</button>
        </div>
        <div id="level-info">
          <h2 id="level-title"></h2>
          <div id="timer-display" style="font-size: 0.8rem; font-weight: 800; color: var(--accent); margin-top: 5px; display: none;">00:00</div>
          <p id="level-instructions"></p>
        </div>
      </div>

      <!-- Main Dock (Bottom Center) -->
      <div id="bottom-dock" class="glass-module">
        <div id="inventory-items">
          <div class="inventory-item" id="item-laser" data-type="laser" title="Laser Emitter">
            <div class="icon">🔦</div>
            <div class="item-count"></div>
          </div>
          <div class="inventory-item" id="item-mirror" data-type="mirror" title="Mirror">
            <div class="icon">🪞</div>
            <div class="item-count"></div>
          </div>
          <div class="inventory-item" id="item-prism" data-type="prism" title="Prism">
            <div class="icon">🔺</div>
            <div class="item-count"></div>
          </div>
          <div class="inventory-item" id="item-absorber" data-type="absorber" title="Absorber">
            <div class="icon">⬛</div>
            <div class="item-count"></div>
          </div>
          <div class="inventory-item" id="btn-delete" title="Delete Mode">
            <div class="icon">🗑️</div>
          </div>
        </div>

        <div class="dock-divider"></div>

        <div id="action-buttons">
          <button id="btn-start" class="btn-primary-pill">Start</button>
          <button id="btn-hint" class="btn-secondary-pill" style="display:none;">Hint</button>
          <button id="btn-clear" class="btn-secondary-pill">Clear</button>
        </div>
      </div>

      <!-- Rotation Panel (Bottom Right) -->
      <div id="rotation-container" class="glass-module" style="display: none;">
        <div class="control-group">
          <label id="rotation-label-h" for="rotation-slider-h">H-Angle</label>
          <input type="range" id="rotation-slider-h" min="0" max="360" value="0">
        </div>
        <div class="control-group">
          <label id="rotation-label-v" for="rotation-slider-v">V-Angle</label>
          <input type="range" id="rotation-slider-v" min="-90" max="90" value="0">
        </div>
      </div>

      <!-- Grid & Help (Top Right) -->
      <div id="actions-container">
        <button id="btn-gyro" class="btn-secondary-pill" title="Toggle Gyro AR Mode">📱</button>
        <button id="btn-help" class="btn-secondary-pill" title="How to play">❓</button>
        <button id="btn-grid-toggle" class="btn-secondary-pill" title="Toggle Grid Type">🌐</button>
      </div>
    </div>

    <div id="notification-container"></div>
  </body>
</html>
