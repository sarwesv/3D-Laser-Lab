<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="laserGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:rgb(255,0,0);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(255,0,0);stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- Emitter body -->
  <rect x="10" y="35" width="40" height="30" rx="4" fill="#333" />
  <rect x="45" y="42" width="10" height="16" fill="#555" />
  <!-- Laser beam -->
  <rect x="55" y="47" width="45" height="6" fill="#ff0000" />
  <!-- Glow -->
  <circle cx="55" cy="50" r="10" fill="url(#laserGlow)" />
</svg>
